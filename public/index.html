<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>T字路 旋回シミュレーター</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <aside class="panel">
      <header class="panelHeader">
        <p class="eyebrow">Turning Envelope</p>
        <h1>T字路 旋回シミュレーター</h1>
      </header>

      <section class="section">
        <h2>車両</h2>
        <label class="field">
          <span>プリセット</span>
          <select id="presetSelect"></select>
        </label>
        <div class="grid2">
          <label class="field"><span>全長 m</span><input id="vehLength" type="number" step="0.01"></label>
          <label class="field"><span>全幅 m</span><input id="vehWidth" type="number" step="0.01"></label>
          <label class="field"><span>ホイールベース m</span><input id="wheelbase" type="number" step="0.01"></label>
          <label class="field"><span>前端から前輪 m</span><input id="frontOffset" type="number" step="0.01"></label>
          <label class="field"><span>最小回転半径 m</span><input id="rmin" type="number" step="0.01"></label>
          <label class="field"><span>余裕幅 m</span><input id="skillMargin" type="number" step="0.01" value="0.10"></label>
        </div>
      </section>

      <section class="section">
        <h2>道路</h2>
        <div class="grid2">
          <label class="field"><span>縦道路幅 m</span><input id="roadA" type="number" step="0.1" value="6.0"></label>
          <label class="field"><span>横道路幅 m</span><input id="roadB" type="number" step="0.1" value="6.0"></label>
          <label class="field"><span>計算間隔 m</span><input id="gridRes" type="number" step="0.05" value="0.25" min="0.05"></label>
        </div>
      </section>

      <section class="section">
        <h2>操作</h2>
        <label class="switchLine">
          <input id="flipVertical" type="checkbox">
          <span>上下反転</span>
        </label>
        <div class="modeToggle" role="group" aria-label="進入方向">
          <input id="entryTop" name="entryMode" type="radio" value="top" checked>
          <label id="entryTopLabel" for="entryTop">上から</label>
          <input id="entryLeft" name="entryMode" type="radio" value="fromLeft">
          <label id="entryLeftLabel" for="entryLeft">左から左折</label>
          <input id="entryRight" name="entryMode" type="radio" value="fromRight">
          <label id="entryRightLabel" for="entryRight">右から右折</label>
        </div>
        <div id="turnToggle" class="turnToggle" role="group" aria-label="曲がる方向">
          <input id="turnLeft" name="turnDirection" type="radio" value="left" checked>
          <label id="turnLeftLabel" for="turnLeft">左折</label>
          <input id="turnRight" name="turnDirection" type="radio" value="right">
          <label id="turnRightLabel" for="turnRight">右折</label>
        </div>
        <div class="buttons">
          <button id="computeGrid" type="button">開始可能領域を計算</button>
          <button id="playSim" type="button" class="secondary">サンプル再生</button>
        </div>
        <div class="legend">
          <span><i class="okBoth"></i>選択方向で可</span>
          <span><i class="otherOk"></i>反対方向のみ可</span>
          <span><i class="fail"></i>不可</span>
          <span><i class="turnPoint"></i>曲がり始め</span>
          <span><i class="cornerFront"></i>前角軌跡</span>
          <span><i class="cornerRear"></i>後角軌跡</span>
        </div>
        <p id="status" class="status">方向を選び、道路内をクリックすると、その位置で曲がり始める軌跡を再生します。</p>
      </section>
    </aside>

    <main class="stage">
      <canvas id="canvas" width="1100" height="760"></canvas>
    </main>
  </div>
  <script src="libs/geometry.js"></script>
  <script src="app.js"></script>
</body>
</html>
